<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Session Roadmap</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0d1117;
  color: #c9d1d9;
  padding: 24px;
}
h1 {
  font-size: 1.5rem;
  margin-bottom: 8px;
  color: #f0f6fc;
}
.meta {
  font-size: 0.85rem;
  color: #8b949e;
  margin-bottom: 24px;
}
.view-toggle {
  display: inline-flex;
  gap: 4px;
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 6px;
  padding: 2px;
  margin-left: 12px;
}
.view-btn {
  padding: 4px 12px;
  border: none;
  background: transparent;
  color: #8b949e;
  font-size: 0.8rem;
  border-radius: 4px;
  cursor: pointer;
}
.view-btn.active {
  background: #30363d;
  color: #f0f6fc;
}
.project-group {
  margin-bottom: 24px;
}
.project-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid #21262d;
}
.project-name {
  font-size: 1.15rem;
  font-weight: 600;
  color: #f0f6fc;
}
.project-count {
  font-size: 0.75rem;
  color: #8b949e;
  background: #21262d;
  padding: 2px 8px;
  border-radius: 10px;
}
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
  gap: 16px;
}
.card {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 8px;
  padding: 16px;
  cursor: pointer;
  transition: border-color 0.15s;
}
.card:hover { border-color: #484f58; }
.card.expanded { border-color: #58a6ff; }
.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.card-name {
  font-weight: 600;
  font-size: 1.1rem;
  color: #f0f6fc;
}
.card-status {
  font-size: 0.75rem;
  padding: 2px 8px;
  border-radius: 12px;
  font-weight: 500;
}
.status-in-progress { background: #1f6feb33; color: #58a6ff; }
.status-review { background: #8957e533; color: #bc8cff; }
.status-blocked { background: #da363333; color: #f85149; }
.status-done { background: #23863533; color: #3fb950; }
.card-branch {
  font-size: 0.85rem;
  color: #8b949e;
  margin-bottom: 8px;
  font-family: monospace;
}
.card-prompt {
  font-size: 0.85rem;
  color: #c9d1d9;
  margin-bottom: 16px;
  line-height: 1.4;
  max-height: 3.6em;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-insights {
  background: #0d111766;
  border: 1px solid #30363d;
  border-radius: 6px;
  padding: 10px 12px;
  margin-bottom: 12px;
  font-size: 0.82rem;
  line-height: 1.5;
}
.insight-row {
  display: flex;
  gap: 6px;
  margin-bottom: 2px;
}
.insight-label {
  color: #8b949e;
  min-width: 44px;
  flex-shrink: 0;
}
.insight-value {
  color: #c9d1d9;
}
.insight-freshness {
  font-size: 0.7rem;
  color: #484f58;
  text-align: right;
  margin-top: 4px;
}
.attention-badge {
  font-size: 0.7rem;
  padding: 1px 6px;
  border-radius: 8px;
  font-weight: 500;
  margin-left: 8px;
}
.attention-active { background: #1f6feb33; color: #58a6ff; }
.attention-waiting { background: #8957e533; color: #bc8cff; }
.attention-idle { background: #30363d; color: #8b949e; }
.attention-blocked { background: #da363333; color: #f85149; }
.pipeline {
  display: flex;
  gap: 4px;
  align-items: center;
}
.stage {
  display: flex;
  flex-direction: column;
  align-items: center;
  flex: 1;
  position: relative;
}
.stage-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  border: 2px solid #30363d;
  background: #0d1117;
  z-index: 1;
}
.stage-dot.reached { background: #30363d; border-color: #484f58; }
.stage-dot.current { background: #58a6ff; border-color: #58a6ff; box-shadow: 0 0 8px #58a6ff44; }
.stage-label {
  font-size: 0.65rem;
  color: #484f58;
  margin-top: 4px;
  text-align: center;
  white-space: nowrap;
}
.stage-label.reached { color: #8b949e; }
.stage-label.current { color: #58a6ff; font-weight: 600; }
.connector {
  height: 2px;
  flex: 0.5;
  background: #30363d;
  margin-top: -10px;
}
.connector.reached { background: #484f58; }
.card-footer {
  display: flex;
  justify-content: space-between;
  margin-top: 12px;
  font-size: 0.75rem;
  color: #484f58;
}
.card-links a {
  color: #58a6ff;
  text-decoration: none;
  margin-left: 8px;
}
.card-links a:hover { text-decoration: underline; }
.card-milestones {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 10px;
  margin-bottom: 4px;
}
.milestone-chip {
  font-size: 0.7rem;
  padding: 2px 8px;
  border-radius: 10px;
  background: #21262d;
  border: 1px solid #30363d;
  color: #8b949e;
  white-space: nowrap;
}
.milestone-chip.achieved {
  background: #1f6feb22;
  border-color: #1f6feb44;
  color: #58a6ff;
}
/* Timeline panel */
.timeline-panel {
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid #21262d;
}
.timeline-title {
  font-size: 0.8rem;
  color: #8b949e;
  margin-bottom: 8px;
  font-weight: 600;
}
.timeline-event {
  display: flex;
  gap: 10px;
  padding: 4px 0;
  font-size: 0.78rem;
  align-items: flex-start;
}
.timeline-dot-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 16px;
  flex-shrink: 0;
}
.timeline-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #484f58;
  flex-shrink: 0;
  margin-top: 4px;
}
.timeline-dot.session_start { background: #3fb950; }
.timeline-dot.session_end { background: #8b949e; }
.timeline-dot.first_commit, .timeline-dot.commit { background: #f0883e; }
.timeline-dot.first_push { background: #58a6ff; }
.timeline-dot.pr_created { background: #bc8cff; }
.timeline-dot.pr_merged { background: #3fb950; }
.timeline-dot.status_change { background: #d2a8ff; }
.timeline-dot.command { background: #8b949e; }
.timeline-line {
  width: 2px;
  flex: 1;
  background: #21262d;
  min-height: 8px;
}
.timeline-content {
  flex: 1;
}
.timeline-type {
  color: #8b949e;
  min-width: 90px;
  display: inline-block;
}
.timeline-detail {
  color: #c9d1d9;
}
.timeline-time {
  color: #484f58;
  font-size: 0.7rem;
  margin-left: auto;
  flex-shrink: 0;
}
.timeline-loading {
  color: #484f58;
  font-size: 0.78rem;
  font-style: italic;
}
.empty {
  text-align: center;
  color: #484f58;
  padding: 48px;
  font-size: 1.1rem;
}
</style>
</head>
<body>
<h1>Session Roadmap
  <span class="view-toggle">
    <button class="view-btn active" id="btn-project" onclick="setView('project')">Project</button>
    <button class="view-btn" id="btn-flat" onclick="setView('flat')">Flat</button>
  </span>
</h1>
<div class="meta" id="meta">Loading...</div>
<div id="content"></div>

<script>
// All data comes from the local devctx API.
// All dynamic values are inserted via textContent (safe against XSS).
var currentView = 'project';
var cachedData = null;

const PHASES = ['idle', 'implementation', 'committed', 'pushed', 'pr_open', 'done'];
const PHASE_LABELS = {
  idle: 'Idle', implementation: 'Impl', committed: 'Commit',
  pushed: 'Push', pr_open: 'PR', done: 'Done'
};
const EVENT_LABELS = {
  session_start: 'Session Start', session_end: 'Session End',
  first_commit: 'First Commit', commit: 'Commit',
  first_push: 'First Push', pr_created: 'PR Created',
  pr_merged: 'PR Merged', command: 'Command', status_change: 'Status Change'
};

function setView(view) {
  currentView = view;
  document.getElementById('btn-project').className = 'view-btn' + (view === 'project' ? ' active' : '');
  document.getElementById('btn-flat').className = 'view-btn' + (view === 'flat' ? ' active' : '');
  if (cachedData) render(cachedData);
}

function phaseIndex(phase) {
  var idx = PHASES.indexOf(phase);
  return idx >= 0 ? idx : 0;
}

function createInsightRow(label, value) {
  var row = document.createElement('div');
  row.className = 'insight-row';
  var labelEl = document.createElement('span');
  labelEl.className = 'insight-label';
  labelEl.textContent = label;
  var valueEl = document.createElement('span');
  valueEl.className = 'insight-value';
  valueEl.textContent = value;
  row.appendChild(labelEl);
  row.appendChild(valueEl);
  return row;
}

function createPipeline(currentPhase) {
  var container = document.createElement('div');
  container.className = 'pipeline';
  var currentIdx = phaseIndex(currentPhase);

  PHASES.forEach(function(phase, i) {
    if (i > 0) {
      var conn = document.createElement('div');
      conn.className = 'connector' + (i <= currentIdx ? ' reached' : '');
      container.appendChild(conn);
    }
    var stage = document.createElement('div');
    stage.className = 'stage';
    var dot = document.createElement('div');
    dot.className = 'stage-dot';
    if (i < currentIdx) dot.classList.add('reached');
    else if (i === currentIdx) dot.classList.add('current');
    var label = document.createElement('div');
    label.className = 'stage-label';
    if (i < currentIdx) label.classList.add('reached');
    else if (i === currentIdx) label.classList.add('current');
    label.textContent = PHASE_LABELS[phase];
    stage.appendChild(dot);
    stage.appendChild(label);
    container.appendChild(stage);
  });

  return container;
}

function createMilestoneChips(ms) {
  var container = document.createElement('div');
  container.className = 'card-milestones';

  function addChip(label, achieved) {
    var chip = document.createElement('span');
    chip.className = 'milestone-chip' + (achieved ? ' achieved' : '');
    chip.textContent = label;
    container.appendChild(chip);
  }

  addChip('Sessions: ' + (ms.session_count || 0), ms.session_count > 0);
  addChip('Commits: ' + (ms.commit_count || 0), ms.commit_count > 0);
  if (ms.first_push_at && ms.first_push_at !== '0001-01-01T00:00:00Z') addChip('Pushed', true);
  if (ms.pr_created_at && ms.pr_created_at !== '0001-01-01T00:00:00Z') addChip('PR Created', true);
  if (ms.pr_merged_at && ms.pr_merged_at !== '0001-01-01T00:00:00Z') addChip('Merged', true);
  addChip('Commands: ' + (ms.command_count || 0), ms.command_count > 0);

  return container;
}

function formatTime(ts) {
  if (!ts) return '';
  var d = new Date(ts);
  if (isNaN(d.getTime())) return '';
  return d.toLocaleString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function createTimelineEvent(evt) {
  var row = document.createElement('div');
  row.className = 'timeline-event';

  var dotCol = document.createElement('div');
  dotCol.className = 'timeline-dot-col';
  var dot = document.createElement('div');
  dot.className = 'timeline-dot ' + (evt.type || '');
  dotCol.appendChild(dot);
  var line = document.createElement('div');
  line.className = 'timeline-line';
  dotCol.appendChild(line);
  row.appendChild(dotCol);

  var content = document.createElement('div');
  content.className = 'timeline-content';
  var typeSpan = document.createElement('span');
  typeSpan.className = 'timeline-type';
  typeSpan.textContent = EVENT_LABELS[evt.type] || evt.type;
  content.appendChild(typeSpan);
  if (evt.detail) {
    var detail = document.createElement('span');
    detail.className = 'timeline-detail';
    detail.textContent = evt.detail;
    content.appendChild(detail);
  }
  row.appendChild(content);

  var time = document.createElement('span');
  time.className = 'timeline-time';
  time.textContent = formatTime(evt.occurred_at);
  row.appendChild(time);

  return row;
}

async function toggleTimeline(card, sessionName) {
  var existing = card.querySelector('.timeline-panel');
  if (existing) {
    existing.remove();
    card.classList.remove('expanded');
    return;
  }

  card.classList.add('expanded');
  var panel = document.createElement('div');
  panel.className = 'timeline-panel';
  var title = document.createElement('div');
  title.className = 'timeline-title';
  title.textContent = 'Event Timeline';
  panel.appendChild(title);

  var loading = document.createElement('div');
  loading.className = 'timeline-loading';
  loading.textContent = 'Loading...';
  panel.appendChild(loading);
  card.appendChild(panel);

  try {
    var res = await fetch('/api/timeline/' + encodeURIComponent(sessionName));
    var data = await res.json();
    loading.remove();

    if (data.events && data.events.length > 0) {
      // Show newest first
      var events = data.events.slice().reverse();
      events.forEach(function(evt) {
        panel.appendChild(createTimelineEvent(evt));
      });
    } else {
      var empty = document.createElement('div');
      empty.className = 'timeline-loading';
      empty.textContent = 'No events recorded yet.';
      panel.appendChild(empty);
    }
  } catch (e) {
    loading.textContent = 'Error loading timeline: ' + e.message;
  }
}

function createCard(entry) {
  var card = document.createElement('div');
  card.className = 'card';
  card.onclick = function() { toggleTimeline(card, entry.name); };

  var header = document.createElement('div');
  header.className = 'card-header';
  var name = document.createElement('span');
  name.className = 'card-name';
  name.textContent = entry.name;
  var status = document.createElement('span');
  status.className = 'card-status status-' + (entry.status || '').replace(/[^a-z-]/g, '');
  status.textContent = entry.status;
  header.appendChild(name);
  header.appendChild(status);
  card.appendChild(header);

  var branch = document.createElement('div');
  branch.className = 'card-branch';
  branch.textContent = entry.branch || 'no branch';
  card.appendChild(branch);

  if (entry.goal || entry.current_focus || entry.next_step) {
    var insights = document.createElement('div');
    insights.className = 'card-insights';
    if (entry.goal) insights.appendChild(createInsightRow('Goal', entry.goal));
    if (entry.current_focus) insights.appendChild(createInsightRow('Focus', entry.current_focus));
    if (entry.next_step) insights.appendChild(createInsightRow('Next', entry.next_step));
    if (entry.attention_state) {
      var badge = document.createElement('span');
      badge.className = 'attention-badge attention-' + entry.attention_state;
      badge.textContent = entry.attention_state;
      insights.appendChild(badge);
    }
    if (entry.inferred_at) {
      var fresh = document.createElement('div');
      fresh.className = 'insight-freshness';
      fresh.textContent = 'Inferred: ' + entry.inferred_at;
      insights.appendChild(fresh);
    }
    card.appendChild(insights);
  } else if (entry.initial_prompt) {
    var prompt = document.createElement('div');
    prompt.className = 'card-prompt';
    prompt.textContent = entry.initial_prompt;
    card.appendChild(prompt);
  }

  card.appendChild(createPipeline(entry.phase));

  if (entry.milestones) {
    card.appendChild(createMilestoneChips(entry.milestones));
  }

  var footer = document.createElement('div');
  footer.className = 'card-footer';
  var timeEl = document.createElement('span');
  timeEl.textContent = entry.last_seen;
  footer.appendChild(timeEl);

  var links = document.createElement('span');
  links.className = 'card-links';
  if (entry.pr_url) {
    var a = document.createElement('a');
    a.href = entry.pr_url;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.textContent = 'PR';
    a.onclick = function(e) { e.stopPropagation(); };
    links.appendChild(a);
  }
  if (entry.issue_url) {
    var a2 = document.createElement('a');
    a2.href = entry.issue_url;
    a2.target = '_blank';
    a2.rel = 'noopener noreferrer';
    a2.textContent = 'Issue';
    a2.onclick = function(e) { e.stopPropagation(); };
    links.appendChild(a2);
  }
  footer.appendChild(links);
  card.appendChild(footer);

  return card;
}

function renderProjectView(groups) {
  var container = document.getElementById('content');
  container.replaceChildren();

  if (groups.length === 0) {
    var empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = 'No sessions registered.';
    container.appendChild(empty);
    return;
  }

  var totalSessions = 0;
  groups.forEach(function(group) {
    var section = document.createElement('div');
    section.className = 'project-group';

    var header = document.createElement('div');
    header.className = 'project-header';
    var nameEl = document.createElement('span');
    nameEl.className = 'project-name';
    nameEl.textContent = group.name;
    header.appendChild(nameEl);
    var countEl = document.createElement('span');
    countEl.className = 'project-count';
    countEl.textContent = group.sessions.length + ' session(s)';
    header.appendChild(countEl);
    section.appendChild(header);

    var cards = document.createElement('div');
    cards.className = 'cards';
    group.sessions.forEach(function(entry) {
      cards.appendChild(createCard(entry));
    });
    section.appendChild(cards);

    container.appendChild(section);
    totalSessions += group.sessions.length;
  });

  var now = new Date();
  document.getElementById('meta').textContent =
    groups.length + ' project(s), ' + totalSessions + ' session(s) | Updated: ' + now.toLocaleTimeString();
}

function renderFlatView(groups) {
  var container = document.getElementById('content');
  container.replaceChildren();

  var allSessions = [];
  groups.forEach(function(g) {
    g.sessions.forEach(function(s) { allSessions.push(s); });
  });

  if (allSessions.length === 0) {
    var empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = 'No sessions registered.';
    container.appendChild(empty);
    return;
  }

  var cards = document.createElement('div');
  cards.className = 'cards';
  allSessions.forEach(function(entry) {
    cards.appendChild(createCard(entry));
  });
  container.appendChild(cards);

  var now = new Date();
  document.getElementById('meta').textContent =
    allSessions.length + ' session(s) | Updated: ' + now.toLocaleTimeString();
}

function render(data) {
  if (currentView === 'project') {
    renderProjectView(data);
  } else {
    renderFlatView(data);
  }
}

async function refresh() {
  try {
    var res = await fetch('/api/roadmap-map');
    cachedData = await res.json();
    render(cachedData);
  } catch (e) {
    document.getElementById('meta').textContent = 'Error: ' + e.message;
  }
}

refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
